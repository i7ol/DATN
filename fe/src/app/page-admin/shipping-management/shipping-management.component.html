<div class="container mx-auto p-6 max-w-4xl pt-32">
  <button
    routerLink="/admin/orders"
    class="mb-4 inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 text-sm font-medium"
  >
    ← Quay lại danh sách đơn hàng
  </button>
  <div class="mb-6">
    <h1 class="text-2xl font-bold">Quản lý Vận chuyển - Đơn #{{ orderId }}</h1>
  </div>

  <div class="bg-white rounded-xl shadow p-8">
    <div class="text-center mb-8">
      <h2 class="text-xl font-semibold mb-4">Mã vận đơn</h2>
      <div class="text-3xl font-mono bg-gray-100 p-6 rounded-lg">
        {{ trackingCode || "Đang tải..." }}
      </div>
    </div>

    <div class="flex justify-center">
      <button
        mat-raised-button
        color="primary"
        (click)="startShipping()"
        [disabled]="loading || !trackingCode"
        class="px-8 py-3 text-lg"
      >
        <span *ngIf="loading">Đang xử lý...</span>
        <span *ngIf="!loading">BẮT ĐẦU VẬN CHUYỂN</span>
      </button>
    </div>

    <p class="text-center text-gray-500 mt-6 text-sm">
      Nhấn nút trên để chuyển đơn hàng sang trạng thái
      <strong>Đang vận chuyển</strong>
    </p>
  </div>
</div>
