<div class="page-header pt-32">
  <h2>Quản lý Người dùng</h2>
  <button nz-button nzType="primary" (click)="createNewUser()">
    <i nz-icon nzType="plus"></i> Thêm người dùng
  </button>
</div>

<nz-table #basicTable [nzData]="users" [nzBordered]="true">
  <thead>
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Email</th>
      <th>Số điện thoại</th>
      <th>Quyền</th>
      <th>Hành động</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users">
      <td>{{ user.id }}</td>
      <td>{{ user.username }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.phone }}</td>
      <td>
        <nz-tag *ngFor="let role of user.roles" [nzColor]="'blue'">{{
          role
        }}</nz-tag>
      </td>
      <td>
        <button
          nz-button
          nzType="default"
          (click)="openAssignRole(user)"
          style="margin-right: 8px"
        >
          Phân quyền
        </button>
        <button
          nz-button
          nzType="primary"
          (click)="editUser(user)"
          style="margin-right: 8px"
        >
          Sửa
        </button>
        <button nz-button nzDanger (click)="deleteUser(user.id!)">Xóa</button>
      </td>
    </tr>
  </tbody>
</nz-table>
