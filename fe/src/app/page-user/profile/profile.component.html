<div class="max-w-4xl mx-auto p-6">
  <h1 class="text-2xl font-semibold mb-6">Hồ sơ của tôi</h1>

  <div *ngIf="loading" class="text-gray-500">Đang tải thông tin...</div>
  <form
    *ngIf="!loading && form"
    [formGroup]="form"
    (ngSubmit)="saveProfile()"
    class="space-y-5"
  >
    <!-- Username -->
    <div>
      <label class="block text-sm text-gray-600 mb-1">Tên đăng nhập</label>
      <input
        formControlName="username"
        class="w-full border rounded px-4 py-2 bg-gray-100"
        readonly
      />
    </div>

    <!-- Email -->
    <div>
      <label class="block text-sm text-gray-600 mb-1">Email</label>
      <input
        formControlName="email"
        class="w-full border rounded px-4 py-2"
        type="email"
      />
    </div>

    <!-- Phone -->
    <div>
      <label class="block text-sm text-gray-600 mb-1">Số điện thoại</label>
      <input formControlName="phone" class="w-full border rounded px-4 py-2" />
    </div>

    <!--Tỉnh/Thành/Quận/Huyện/Phường/Xã -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Tỉnh/Thành *</label
        >
        <select
          formControlName="province"
          (change)="loadDistricts($event.target.value)"
          [class]="
            'w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-black focus:border-transparent transition bg-white ' +
            getValidationClass('province')
          "
        >
          <option value="">Chọn tỉnh/thành</option>
          <option *ngFor="let p of provinces" [value]="p.code">
            {{ p.name }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Quận/Huyện *</label
        >
        <select
          formControlName="district"
          (change)="loadWards($event.target.value)"
          [class]="
            'w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-black focus:border-transparent transition bg-white ' +
            getValidationClass('district')
          "
        >
          <option value="">Chọn quận/huyện</option>
          <option *ngFor="let d of districts" [value]="d.code">
            {{ d.name }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Phường/Xã *</label
        >
        <select
          formControlName="ward"
          [class]="
            'w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-black focus:border-transparent transition bg-white ' +
            getValidationClass('ward')
          "
        >
          <option value="">Chọn phường/xã</option>
          <option *ngFor="let w of wards" [value]="w.code">
            {{ w.name }}
          </option>
        </select>
      </div>
    </div>
    <!-- Address -->
    <div>
      <label class="block text-sm text-gray-600 mb-1">Địa chỉ</label>
      <textarea
        formControlName="address"
        rows="3"
        class="w-full border rounded px-4 py-2"
      ></textarea>
    </div>

    <!-- Roles -->
    <div *ngIf="user?.roles?.length">
      <label class="block text-sm text-gray-600 mb-1">Quyền</label>
      <div class="flex gap-2">
        <span
          *ngFor="let r of user.roles"
          class="px-3 py-1 bg-blue-100 text-blue-700 text-sm rounded-full"
        >
          {{ r }}
        </span>
      </div>
    </div>
    <div>
      <button
        type="submit"
        class="text-white px-4 py-2 rounded transition bg-blue-500 hover:bg-blue-600"
      >
        Lưu thông tin
      </button>
    </div>
  </form>
</div>
